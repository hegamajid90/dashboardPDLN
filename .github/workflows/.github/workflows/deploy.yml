name: Deploy Dashboard PDLN KKP ke GitHub Pages

on:
  push:
    branches:
      - main          # Trigger otomatis setiap push ke branch main
  workflow_dispatch:  # Bisa trigger manual dari tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Upload seluruh folder root (berisi index.html)

      - name: 🚀 Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
